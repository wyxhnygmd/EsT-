<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsT- 官方下载页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* 炫彩动态背景 */
        body {
            min-height: 100vh;
            background: linear-gradient(120deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        /* 背景渐变动画 */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 主容器 */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        /* 标题样式 */
        .title {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            background: linear-gradient(90deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
            to { text-shadow: 0 0 20px rgba(255, 215, 0, 0.9), 0 0 30px rgba(255, 215, 0, 0.7); }
        }

        /* 描述文本 */
        .desc {
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
            color: #f0f0f0;
        }

        /* 下载按钮通用样式 */
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #0078ff, #00c6ff);
            box-shadow: 0 4px 15px rgba(0, 120, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 按钮 hover 动画 */
        .download-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 120, 255, 0.5);
        }

        /* 按钮点击波纹效果 */
        .download-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .download-btn:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        /* 国内版按钮渐变 */
        .download-btn.domestic {
            background: linear-gradient(45deg, #28a745, #20c997);
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .download-btn.domestic:hover {
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.5);
        }

        /* 历史版本区域 */
        .history-section {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .history-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        /* 历史版本按钮样式 */
        .history-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            .title {
                font-size: 2rem;
            }
            .download-btn {
                display: block;
                width: 90%;
                margin: 10px auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">

                <a href="https://github.com/wyxhnygmd/EsT-/releases/download/v.2025.12.31/2026.2.docx" class="history-btn">v.2025.12.31 · 国外下载</a>

    <!-- 可选：添加页面加载动画 -->
    <script>
        // 页面加载时的淡入效果
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            container.style.opacity = 0;
            container.style.transform = 'translateY(20px)';
            container.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
            
            setTimeout(() => {
                container.style.opacity = 1;
                container.style.transform = 'translateY(0)';
            }, 300);
        });
    </script>
</body>
</html>
